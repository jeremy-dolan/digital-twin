<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Virtual Jeremy</title>
    <style>
        iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 1.2s; }
        iframe.loaded { opacity: 1; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: white; }
        @media (prefers-color-scheme: dark) {
            body, html { background: #0b0f19; }
        }
        /* floating footer bar */
        .footer-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 40px;
            display: flex; align-items: center; justify-content: center; gap: 22px;
            font-family: system-ui, sans-serif; font-size: 13px;
            color: #6b7280; z-index: 10;
        }
        .footer-bar a {
            color: #6b7280; text-decoration: none;
            display: inline-flex; align-items: center;
            gap: 5px; /* Github icon to text spacing */
        }
        .footer-bar a:hover { color: #374151; }
        @media (prefers-color-scheme: dark) {
            .footer-bar a:hover { color: #d1d5db; }
        }
    </style>
    <link rel="icon" sizes="16x16" type="image/png" href="/assets/16.png">
    <link rel="icon" sizes="32x32" type="image/png" href="/assets/32.png">
    <link rel="icon" sizes="48x48" type="image/png" href="/assets/48.png">
    <link rel="apple-touch-icon" sizes="180x180" type="image/png" href="/assets/180.png">
</head>
<body>
<iframe src="https://jeremy-dolan-digital-twin.hf.space/" onload="this.classList.add('loaded')"></iframe>
<div class="footer-bar">
   <a href="https://github.com/jeremy-dolan/digital-twin#readme" target="_blank" rel="noopener">
        How I built this →</a>
</div>
</body>
</html>
